services:
  - type: web
    name: focusflow-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RUST_LOG
        value: focusflow_api=info,tower_http=info
      - key: SERVER_HOST
        value: "0.0.0.0"
      - key: SERVER_PORT
        value: "10000"
