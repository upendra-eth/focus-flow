services:
  postgres:
    image: postgres:17
    container_name: focusflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: focusflow
      POSTGRES_USER: focusflow
      POSTGRES_PASSWORD: focusflow_dev
    ports:
      - "5555:5432"
    volumes:
      - focusflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U focusflow -d focusflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    container_name: focusflow-redis
    restart: unless-stopped
    ports:
      - "6399:6379"

volumes:
  focusflow-postgres-data:
